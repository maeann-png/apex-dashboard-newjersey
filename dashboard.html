<!DOCTYPE html>
<html lang="en">

<title>Chill Medicated · New Jersey · Sales Intelligence</title>

<style>
  :root {
    /* Chill Medicated · Purple Gradient palette (New Jersey market)
       Deep aubergine base → bright magenta accent. Matches brand logo. */
    --bg: #110a1a;            /* very deep purple-black */
    --bg-elev: #1d1428;        /* panel — same hue, raised */
    --bg-elev-2: #281a38;      /* second-level surface */
    --border: #3a2954;
    --border-soft: #261a36;
    --text: #f0e8f5;           /* warm off-white */
    --text-dim: #b5a3c8;       /* muted lavender */
    --text-faint: #6e587d;     /* faint plum */
    --accent: #d24a92;         /* Chill magenta — bright, brand-correct */
    --accent-dim: #a03d75;     /* darker magenta for borders/lines */
    --accent-deep: #7a3fa0;    /* deep purple, gradient endpoint */
    --warm: #f0a868;           /* soft amber (warnings) — unchanged */
    --cool: #b48fd4;           /* secondary lavender */
    --rose: #e07594;           /* soft rose (errors / negative) — already on-palette */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {

      radial-gradient(ellipse 1200px 600px at 80% -10%, rgba(210,74,146,0.06), transparent 60%),

  }

  /* Typography */
  .font-display { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* Layout */
  .app { max-width: 1600px; margin: 0 auto; padding: 32px 40px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .brand-mark {
    display: flex; align-items: baseline; gap: 14px;
  }
  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
  }
  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .brand-name em { color: var(--accent); font-style: italic; font-weight: 400; }
  .topbar-meta {
    display: flex; gap: 24px; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .topbar-meta strong { color: var(--text); font-weight: 500; }
  .pulse {
    width: 6px; height: 6px; border-radius: 50%;

    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }

  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 44px; height: 44px;
    margin: 0 auto 20px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;

    background: var(--bg-elev);

    margin-bottom: 32px;

    content: '';

    width: 24px; height: 1px;
    background: var(--accent);

    transition: opacity 0.2s;

  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px;

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Rank list */
  .rank-list { display: flex; flex-direction: column; }
  .rank-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-soft);
    position: relative;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .rank-name {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rank-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .rank-bar {
    position: absolute;
    bottom: 0; left: 38px; right: 0;
    height: 1px;
    background: var(--accent-dim);
    opacity: 0.4;
  }

  /* Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .data-table th {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    font-weight: 500;
    background: var(--bg-elev-2);
  }
  .data-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    color: var(--text);
  }
  .data-table tr:hover td { background: rgba(196,255,61,0.02); }
  .data-table .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; }
  .data-table .dim { color: var(--text-dim); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 28px;
    margin-bottom: 12px;
    color: var(--text);
  }
  .empty code {
    display: inline-block;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-radius: 2px;
    color: var(--accent);
    margin: 0 2px;
  }

  /* Status pill */
  .pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid;
  }
  .pill-completed { color: var(--accent); border-color: var(--accent-dim); background: rgba(196,255,61,0.06); }
  .pill-pending { color: var(--warm); border-color: var(--warm); background: rgba(232,138,60,0.06); }
  .pill-overdue { color: var(--rose); border-color: var(--rose); background: rgba(217,112,112,0.06); }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3, .grid-half { grid-template-columns: 1fr; }
  }
</style>

// --- Helpers ----------------------------------------------------------------
const parseMoney = str => {
  if (str == null) return 0;
  if (typeof str === 'number') return str;
  // Strip currency, commas, whitespace. Handle accounting-style negatives:
  // "($50.00)" → -50.00, which is how credits/refunds often appear in reports.
  let s = String(str).replace(/[$,\s]/g, '');
  if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1, -1);
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

// Sum line-level discounts across a set of rows. Apex's `discounts` field is per-line,
// so it can be summed freely without deduplication. (Apex also has an `additional_discounts`
// field, but it's not consistently reflected in the Apex UI, so we don't include it.)
const sumLineDiscounts = rowSet => rowSet.reduce((s, r) => s + (r._lineDiscount || 0), 0);

// "Credit of $1,045.22 on 03/17/2026"). Field may be a string OR an array of strings.
// Returns { total, entries } where total is the summed dollar amount of all credits
// found and entries is an array of { amount, date } for display.
const parsePaymentsForCredits = paymentsField => {
  const empty = {
    total: 0,
    entries: []

  if (!paymentsField) return empty;
  // Normalize: accept either an array of strings or a single string
  const text = Array.isArray(paymentsField) ? paymentsField.filter(Boolean).join(', ') : String(paymentsField);

  const re = /Credit\s+of\s+\$([\d,]+(?:\.\d+)?)\s+on\s+(\d{1,2}\/\d{1,2}\/\d{2,4})/gi;
  const entries = [];
  let total = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    const amount = parseFloat(m[1].replace(/,/g, ''));
    if (!isNaN(amount)) {

      entries.push({
        amount,
        date: m[2]

    total,
    entries

const fmtMoney = n => {

/* ---- Downloadable sales report (always reflects the current dashboard filters) ---- */
const __esc = s => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

const __MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
const __ymLabel = ym => __MON[parseInt(ym.slice(5, 7), 10) - 1] + " '" + ym.slice(2, 4);

  if (f.product) parts.push('Search "' + f.product + '"');
  if (f.productLine) parts.push('Line ' + f.productLine);
  if (f.status) parts.push('Payment ' + f.status);
  if (f.rep) parts.push('Rep ' + f.rep);
  if (f.buyer) parts.push('Buyer ' + f.buyer);
  if (f.invoice) parts.push('Invoice ' + f.invoice);

};
const __summaryTable = rows => {
  let net = 0, disc = 0, units = 0; const orders = {}, prods = {};
  rows.forEach(r => { net += r._revenue || 0; disc += r._lineDiscount || 0; units += r._quantity || 0; if (r.order_id) orders[r.order_id] = 1; if (r.product_name) prods[r.product_name] = 1; });
  const body = [['Gross sales', __m2(net + disc)], ['Discounts', __m2(disc)], ['Net sales', __m2(net)], ['Units sold', __i0(units)], ['Orders', __i0(Object.keys(orders).length)], ['Products', __i0(Object.keys(prods).length)]]
    .map(r => '<tr><td>' + __esc(r[0]) + '</td><td>' + __esc(r[1]) + '</td></tr>').join('');

};

  const head = '<tr><th>Product</th><th>Line</th><th>Units</th><th>Gross</th><th>Discounts</th><th>Net</th><th>Avg Unit $</th></tr>';
  const body = arr.map(p => '<tr><td>' + __esc(p.name) + '</td><td>' + __esc(p.line) + '</td><td>' + __i0(p.units) + '</td><td>' + __m2(p.net + p.disc) + '</td><td>' + __m2(p.disc) + '</td><td>' + __m2(p.net) + '</td><td>' + __m2(p.units ? p.net / p.units : 0) + '</td></tr>').join('');

};
const __pivotTable = rows => {
  const prods = {}, mset = {};
  rows.forEach(r => {

const __RTITLE = 'Chill Medicated NJ \u2014 Sales Report';

const normalizeState = raw => {
  if (!raw) return '';
  const clean = String(raw).trim().replace(/\./g, '').toLowerCase();
  if (!clean) return '';
  // Already a 2-letter abbreviation
  if (clean.length === 2) return clean.toUpperCase();
  // Full name → abbreviation
